version: "3.9"

services:
  # LiveKit SFU サーバー (WebRTC)
  livekit:
    image: livekit/livekit-server:latest
    platform: linux/arm64
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./livekit/livekit.yaml:/livekit.yaml:ro
    command: --config /livekit.yaml

  # Pipecat voice server (CI でビルド済み ghcr.io イメージを使用)
  pipecat:
    image: ghcr.io/kishibashi3/agent-hub-voice2:latest
    platform: linux/arm64
    restart: unless-stopped
    network_mode: host
    volumes:
      # OTP 永続化: コンテナ再起動後も発行済み OTP を保持する (issue #10)
      - otp-data:/otp
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-live-001}
      - AGENT_HUB_URL=${AGENT_HUB_URL}
      - AGENT_HUB_USER=${AGENT_HUB_USER:-voice}
      - AGENT_HUB_GITHUB_PAT=${AGENT_HUB_GITHUB_PAT}
      - AGENT_HUB_TENANT=${AGENT_HUB_TENANT:-}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-}
      - PORT=8765
      - OTP_STORE_PATH=/otp/otp.json
    depends_on:
      - livekit

volumes:
  # OTP 永続化ボリューム: コンテナ再起動を跨いで OTP を保持する
  otp-data:

networks:
  voice-net:
    driver: bridge
