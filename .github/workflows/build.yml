name: Build and push ARM64 image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm   # ネイティブ ARM64 ランナー (QEMU 不要、パブリック repo 無料)
    permissions:
      contents: read
      packages: write   # ghcr.io への push に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # BuildKit ベースの buildx を有効化 (キャッシュ利用のため)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GitHub Container Registry にログイン
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ARM64 ネイティブでビルドして push
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/kishibashi3/agent-hub-voice2:latest
            ghcr.io/kishibashi3/agent-hub-voice2:sha-${{ github.sha }}
          # GitHub Actions キャッシュでレイヤーを再利用 (再ビルド高速化)
          cache-from: type=gha
          cache-to: type=gha,mode=max
