<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>agent-hub voice v2</title>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem env(safe-area-inset-right) 1.5rem env(safe-area-inset-left);
    }

    .container { width: 100%; max-width: 380px; }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
      color: #a0a0ff;
      letter-spacing: 0.05em;
    }

    /* ========== Auth Panel ========== */
    #authPanel { display: block; }
    #voicePanel { display: none; }

    .hint {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .otp-input {
      display: block;
      width: 100%;
      font-size: 2.2rem;
      letter-spacing: 0.6rem;
      text-align: center;
      padding: 0.75rem 0.5rem;
      background: #16213e;
      border: 2px solid #334;
      border-radius: 10px;
      color: #fff;
      margin-bottom: 1rem;
      caret-color: #a0a0ff;
    }
    .otp-input:focus { outline: none; border-color: #6060ff; box-shadow: 0 0 0 3px rgba(96,96,255,.2); }

    .btn {
      display: block;
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary { background: #5c5cff; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #4a4aee; }
    .btn-danger  { background: #cc3333; color: #fff; }
    .btn-danger:not(:disabled):hover  { background: #bb2222; }

    /* ========== Voice Panel ========== */
    .status-badge {
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1.5rem;
      min-height: 1.2em;
    }
    .status-badge.listening { color: #4caf50; }

    .mic-btn-wrap { display: flex; justify-content: center; margin-bottom: 2rem; }
    .mic-btn {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: #2a2a5a;
      border: 3px solid #5c5cff;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .mic-btn.speaking {
      background: #3a0000;
      border-color: #cc3333;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(204,51,51,.5); }
      50%       { box-shadow: 0 0 0 14px rgba(204,51,51,0); }
    }

    .transcript {
      background: #16213e;
      border-radius: 10px;
      padding: 1rem;
      min-height: 110px;
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.875rem;
      line-height: 1.55;
      margin-bottom: 1rem;
      scrollbar-width: thin;
      scrollbar-color: #334 transparent;
    }
    .transcript p { margin-bottom: 0.4rem; }
    .transcript .user  { color: #a0a0ff; }
    .transcript .model { color: #d8d8d8; }

    /* ========== banner ========== */
    .banner {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
      padding: 0.7rem 1.2rem;
      font-size: 0.82rem;
      max-width: min(320px, 90vw);
      z-index: 100;
      animation: slideDown 0.2s ease forwards;
      pointer-events: none;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .banner-info { background: #1e1e4a; border: 1px solid #5c5cff; }
    .banner-error { background: #3a0000; border: 1px solid #cc3333; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙 agent-hub voice v2</h1>

  <!-- ========== Auth Panel ========== -->
  <div id="authPanel">
    <p class="hint">
      operator が <code>@voice</code> に <code>/generate-code</code> を送り、<br>
      届いた 6 桁コードを入力してください。
    </p>
    <input
      class="otp-input"
      id="otpInput"
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="6"
      placeholder="000000"
      autocomplete="one-time-code"
      spellcheck="false"
    >
    <button class="btn btn-primary" id="connectBtn" disabled>接続</button>
  </div>

  <!-- ========== Voice Panel ========== -->
  <div id="voicePanel">
    <div class="status-badge" id="statusBadge">接続中...</div>
    <div class="mic-btn-wrap">
      <div class="mic-btn" id="micBtn">🎙</div>
    </div>
    <div class="transcript" id="transcript"></div>
    <button class="btn btn-danger" id="disconnectBtn">切断</button>
  </div>
</div>

<!-- LiveKit JS SDK (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

<script>
'use strict';

const { Room, RoomEvent, Track, RemoteAudioTrack, LocalParticipant } = LivekitClient;

const otpInput      = document.getElementById('otpInput');
const connectBtn    = document.getElementById('connectBtn');
const authPanel     = document.getElementById('authPanel');
const voicePanel    = document.getElementById('voicePanel');
const statusBadge   = document.getElementById('statusBadge');
const micBtn        = document.getElementById('micBtn');
const transcriptEl  = document.getElementById('transcript');
const disconnectBtn = document.getElementById('disconnectBtn');

let room = null;

// ---- Auth panel ----

// 二重 POST 防止フラグ。
// connectBtn.disabled だけでは、DOM 更新前にキューに積まれた click イベントを
// 防げないケースがある (iOS autocomplete auto-submit + 手動タップの同時発生、
// keydown→connectBtn.click() とブラウザ native submit の競合など)。
// アプリ側の state フラグで二重送信を確実に防ぐ。
let _submitting = false;

otpInput.addEventListener('input', () => {
  connectBtn.disabled = otpInput.value.replace(/\D/g, '').length !== 6;
});
otpInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !connectBtn.disabled) {
    e.preventDefault(); // ブラウザ default (implicit form submit 等) を抑止
    connectBtn.click();
  }
});

connectBtn.addEventListener('click', async () => {
  // _submitting フラグ: 二重 POST を防ぐ最終ガード
  // (DOM disabled だけでは既にキューに積まれたイベントを防げないため)
  if (_submitting) return;
  const code = otpInput.value.replace(/\D/g, '');
  if (code.length !== 6) return;
  _submitting = true;
  connectBtn.disabled = true;
  await startSession(code);
});

disconnectBtn.addEventListener('click', () => {
  if (room) room.disconnect();
});

// ---- Session ----

async function startSession(code) {
  setStatus('認証中...');
  let token, url;
  try {
    const res = await fetch('/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 409) {
        showErrorBanner('セッション使用中', '別のデバイスで既にセッションが開いています。');
      } else if (res.status === 401) {
        showErrorBanner('認証失敗', 'OTP が無効または期限切れです。');
      } else {
        showErrorBanner('エラー', data.error || '不明なエラー');
      }
      _submitting = false; // エラー時: フラグをリセットして再試行を許可
      connectBtn.disabled = false;
      setStatus('');
      return;
    }
    token = data.token;
    url = data.url;
  } catch (e) {
    showErrorBanner('接続失敗', e.message);
    _submitting = false; // 例外時: フラグをリセットして再試行を許可
    connectBtn.disabled = false;
    setStatus('');
    return;
  }

  // LiveKit Room 接続
  room = new Room({
    // WebRTC AEC3 は livekitClient / ブラウザが自動で有効化する
    audioCaptureDefaults: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
    },
  });

  room.on(RoomEvent.Connected, () => {
    authPanel.style.display = 'none';
    voicePanel.style.display = 'block';
    setStatus('🎙 話しかけてください', true);
    // マイクを公開
    room.localParticipant.setMicrophoneEnabled(true).catch(console.error);
  });

  room.on(RoomEvent.Disconnected, () => {
    setStatus('切断されました');
    authPanel.style.display = 'block';
    voicePanel.style.display = 'none';
    micBtn.classList.remove('speaking');
    _submitting = false; // セッション終了: フラグをリセットして次の接続を許可
    connectBtn.disabled = false;
    otpInput.value = '';
    room = null;
  });

  room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
    if (track.kind === Track.Kind.Audio) {
      // AI 音声 (Pipecat bot が publish) を自動再生
      // WebRTC 経由で届くため AEC3 が reference signal を取得できる
      const audioEl = track.attach();
      audioEl.autoplay = true;
      document.body.appendChild(audioEl);
    }
  });

  room.on(RoomEvent.TrackUnsubscribed, (track) => {
    track.detach();
  });

  // DataChannel でトランスクリプト受信 (Pipecat が TranscriptProcessor で送信する場合)
  room.on(RoomEvent.DataReceived, (payload, participant, kind) => {
    try {
      const text = new TextDecoder().decode(payload);
      const msg = JSON.parse(text);
      if (msg.type === 'transcript') {
        addTranscript(msg.speaker, msg.text);
      } else if (msg.type === 'speaking_changed') {
        micBtn.classList.toggle('speaking', msg.is_speaking);
        setStatus(msg.is_speaking ? '🤖 AI が話しています...' : '🎙 話しかけてください', !msg.is_speaking);
      }
    } catch { /* 無視 */ }
  });

  try {
    await room.connect(url, token);
  } catch (e) {
    showErrorBanner('LiveKit 接続失敗', e.message);
    _submitting = false; // LiveKit 接続失敗時: フラグをリセットして再試行を許可
    connectBtn.disabled = false;
    setStatus('');
    room = null;
  }
}

// ---- Transcript ----

let _transcriptCurrentEl = { user: null, model: null };

function addTranscript(speaker, text) {
  if (speaker !== 'user' && speaker !== 'model') return;
  if (!_transcriptCurrentEl[speaker]) {
    const p = document.createElement('p');
    p.className = speaker;
    p.textContent = speaker === 'user' ? '👤 ' : '🤖 ';
    transcriptEl.appendChild(p);
    _transcriptCurrentEl[speaker] = p;
  }
  _transcriptCurrentEl[speaker].textContent += text;
  requestAnimationFrame(() => { transcriptEl.scrollTop = transcriptEl.scrollHeight; });
}

// ---- Status ----

function setStatus(text, isListening = false) {
  statusBadge.textContent = text;
  statusBadge.className = 'status-badge' + (isListening ? ' listening' : '');
}

// ---- Banners ----

function showErrorBanner(title, body) {
  _showBanner('banner-error', `<strong style="color:#ff6666">${esc(title)}</strong><br>${esc(body)}`, 6000);
}

function _showBanner(cls, html, duration) {
  const el = document.createElement('div');
  el.className = `banner ${cls}`;
  el.innerHTML = html;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, duration);
}

function esc(s) { return String(s).replace(/</g, '&lt;'); }
</script>
</body>
</html>
